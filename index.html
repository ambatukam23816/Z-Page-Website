<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Store Name</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .product-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
    </style>
</head>
<body class="bg-zinc-50">

    <header class="bg-white border-b sticky top-0 z-50 shadow">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-violet-600 rounded-3xl flex items-center justify-center text-white text-3xl font-bold">M</div>
                <h1 class="text-3xl font-bold">YourStoreName</h1>
            </div>
            <button onclick="checkAdminAccess()" class="bg-violet-600 text-white px-6 py-3 rounded-3xl">Admin</button>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-4xl font-bold mb-10 text-center">My Products</h2>
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </section>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center">
        <div class="bg-white rounded-3xl w-full max-w-xl m-4">
            <div class="p-6 border-b">
                <h2 class="text-2xl font-bold">Add New Product</h2>
            </div>
            <div class="p-6">
                <form id="productForm" class="space-y-4">
                    <input type="text" id="formName" placeholder="Product Name" class="w-full p-4 border rounded-2xl" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="formCategory" placeholder="Category" class="w-full p-4 border rounded-2xl" required>
                        <input type="text" id="formPrice" placeholder="$99" class="w-full p-4 border rounded-2xl" required>
                    </div>
                    <input type="file" id="formImageUpload" accept="image/*" class="w-full p-3 border border-dashed rounded-2xl">
                    <div id="imagePreview" class="hidden mt-3"><img id="previewImg" class="h-48 w-full object-cover rounded-2xl"></div>
                    <textarea id="formDescription" placeholder="Description" class="w-full p-4 border rounded-2xl h-24" required></textarea>
                    <input type="text" id="formLink" placeholder="Affiliate Link" class="w-full p-4 border rounded-2xl" required>
                    <button type="submit" class="w-full bg-violet-600 text-white py-4 rounded-3xl font-semibold">Save Product</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ====================== YOUR PRODUCTS GO HERE ======================
        let products = [
            {
                id: 1,
                name: "Example Product 1",
                category: "tech",
                price: "$299",
                image: "https://picsum.photos/id/1015/600/600",
                description: "This is a great product. Replace with your real one.",
                link: "https://your-affiliate-link.com/product1"
            }
            // Add more products like this ↓
            // {
            //     id: 2,
            //     name: "Another Product",
            //     category: "fashion",
            //     price: "$89",
            //     image: "https://picsum.photos/id/201/600/600",
            //     description: "Nice description here",
            //     link: "https://your-affiliate-link.com/product2"
            // }
        ];

        const ADMIN_PASSWORD = "admin123";

        // Render Products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = "";

            if (products.length === 0) {
                grid.innerHTML = `<p class="text-center py-20 text-gray-500">No products added yet.</p>`;
                return;
            }

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = "product-card bg-white rounded-3xl overflow-hidden border cursor-pointer";
                card.innerHTML = `
                    <img src="${product.image}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <p class="text-xs font-bold text-violet-600">${product.category.toUpperCase()}</p>
                        <h3 class="font-semibold text-xl mt-2">${product.name}</h3>
                        <p class="text-gray-600 text-sm mt-2 mb-4">${product.description}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-3xl font-bold">${product.price}</span>
                            <a href="${product.link}" target="_blank" 
                               class="bg-violet-600 text-white px-6 py-3 rounded-3xl font-medium">Buy Now</a>
                        </div>
                    </div>
                `;
                card.onclick = () => alert("Opening product details..."); // You can improve this later
                grid.appendChild(card);
            });
        }

        // Simple Admin (for now)
        function checkAdminAccess() {
            const pass = prompt("Enter Admin Password:");
            if (pass === ADMIN_PASSWORD) {
                alert("Admin mode is limited in this version.\n\nTo add products, edit the code directly.");
            }
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
